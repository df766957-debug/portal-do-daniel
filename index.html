<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Daniel Ferreira - IA Integrada</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --blue: #58a6ff;
            --green: #238636;
            --border: #30363d;
            --white: #c9d1d9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; scroll-behavior: smooth; }

        /* MENU */
        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a { color: var(--white); text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.9rem; padding: 8px 12px; border-radius: 5px; }
        nav a:hover { background: var(--border); color: var(--blue); }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin: 15px 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .btn { display: block; background: var(--green); color: white; text-align: center; padding: 15px; border-radius: 10px; font-weight: bold; text-decoration: none; margin-top: 10px; }

        /* --- ESTILO DA INTELIGÊNCIA ARTIFICIAL (CHATBOT) --- */
        #ia-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--blue);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 30px;
        }

        #chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: none; /* Escondido por padrão */
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .chat-header { background: var(--blue); padding: 15px; border-radius: 15px 15px 0 0; font-weight: bold; text-align: center; }
        .chat-content { flex: 1; padding: 15px; font-size: 0.85rem; overflow-y: auto; }
        .chat-input { padding: 10px; border-top: 1px solid var(--border); display: flex; }
        .chat-input input { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 5px; border-radius: 5px; }

        footer { text-align: center; padding: 20px; font-size: 0.7rem; color: #8b949e; }
    </style>
</head>
<body>

    <nav>
        <a href="#cursos">CURSOS</a>
        <a href="#astronomia">ASTRONOMIA</a>
        <a href="#animes">ANIMES</a>
    </nav>

    <div class="container">
        
        <div id="cursos" class="card">
            <h2 style="color: var(--blue); text-align: center;">Excel + Power BI 📊</h2>
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/oXBANG0VMUs" allowfullscreen></iframe>
            </div>
            <a href="https://go.hotmart.com/K102868779N?redirectionUrl=https%3A%2F%2Fexperttcursos.com%2Fexcelpowerbi" class="btn">QUERO MEU ACESSO AGORA</a>
        </div>

        <div id="astronomia" class="card">
            <h2 style="color: var(--blue); text-align: center;">Astronomia 🌌</h2>
            <p style="text-align: center;">Curiosidades sobre o Cosmos e Missões NASA.</p>
        </div>

    </div>

    <div id="ia-button" onclick="toggleChat()">🤖</div>

    <div id="chat-window">
        <div class="chat-header">Assistente IA Daniel</div>
        <div class="chat-content">
            <p><strong>IA:</strong> Olá! Sou o assistente do Daniel. Em que posso ajudar hoje?</p>
        </div>
        <div class="chat-input">
            <input type="text" placeholder="Pergunte sobre os cursos...">
        </div>
    </div>

    <footer>
        <p>© 2026 Daniel Ferreira - Portal Inteligente</p>
    </footer>

    <script>
        function toggleChat() {
            var chat = document.getElementById('chat-window');
            if (chat.style.display === 'flex') {
                chat.style.display = 'none';
            } else {
                chat.style.display = 'flex';
            }
        }
    </script>

</body>
</html>
