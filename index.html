<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Inteligente Daniel</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; --white: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 0; overflow-y: auto; }
        
        /* MENU FIXO */
        nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: var(--border); color: white; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .section { display: none; }
        .active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }

        /* BUSCA INTEGRADA */
        .search-area { background: var(--card); padding: 15px; border-bottom: 1px solid var(--border); text-align: center; }
        .search-area input { padding: 10px; width: 60%; border-radius: 5px; border: 1px solid var(--border); background: #000; color: white; }
        
        /* JOGO DO TRIÂNGULO E BALÃO */
        #gameCanvas { background: #000; border: 2px solid var(--blue); display: block; margin: auto; width: 100%; max-width: 320px; height: 400px; touch-action: none; }

        /* CHAT FLUTUANTE */
        #chat-icon { position: fixed; bottom: 20px; right: 20px; background: var(--blue); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 2000; }
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 15px; display: none; flex-direction: column; z-index: 2000; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; gap: 8px; font-size: 0.85rem; }
        .msg { padding: 8px; border-radius: 8px; background: #222; border-left: 3px solid var(--blue); }

        footer { background: #000; padding: 15px; text-align: center; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>

    <nav>
        <button onclick="show('cursos')">📚 Cursos</button>
        <button onclick="show('universo')">🌌 Astronomia</button>
        <button onclick="show('animes')">⛩️ Animes</button>
        <button onclick="show('tv')">📺 TV</button>
        <button onclick="show('jogo')">🎮 Jogo</button>
    </nav>

    <div class="search-area">
        <input type="text" id="topSearch" placeholder="Pergunte às IAs...">
        <button onclick="askSearch()" style="padding:10px; background:var(--blue); border:none; color:white; border-radius:5px; cursor:pointer;">🔍</button>
    </div>

    <div class="container">
        <div id="cursos" class="section active">
            <div class="card" style="text-align:center;">
                <h2>Excel + Power BI 📊</h2>
                <iframe width="100%" height="250" src="https://www.youtube.com/embed/oXBANG0VMUs" frameborder="0" allowfullscreen></iframe>
                <a href="https://go.hotmart.com/K102868779N?redirectionUrl=https%3A%2F%2Fexperttcursos.com%2Fexcelpowerbi" style="display:block; background:var(--green); color:white; padding:15px; margin-top:15px; text-decoration:none; border-radius:10px; font-weight:bold;">COMPRAR AGORA</a>
            </div>
        </div>

        <div id="universo" class="section">
            <div class="card">
                <h2 id="astro-title">Descoberta do Dia</h2>
                <p id="astro-news">Processando dados dos telescópios...</p>
                <div id="astro-text" style="font-size: 0.9rem; line-height: 1.5; color: #aaa;"></div>
            </div>
        </div>

        <div id="animes" class="section">
            <div class="card">
                <h2 id="anime-title">Novidade Otaku</h2>
                <p id="anime-news">Rastreando lançamentos no Japão...</p>
                <div id="anime-text" style="font-size: 0.9rem; line-height: 1.5; color: #aaa;"></div>
            </div>
        </div>

        <div id="tv" class="section">
            <div class="card">
                <h2>Canais de TV Aberta</h2>
                <div id="tvGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
            </div>
        </div>

        <div id="jogo" class="section">
            <div class="card" style="text-align:center;">
                <h2>Estoure os Balões 🎈</h2>
                <canvas id="gameCanvas"></canvas>
                <p>Arraste o triângulo para estourar o balão!</p>
            </div>
        </div>
    </div>

    <div id="chat-icon" onclick="toggleChat()">🤖</div>
    <div id="chat-window">
        <div style="background:var(--blue); padding:10px; font-weight:bold; border-radius:15px 15px 0 0;">Chat IA (Limpa em 10min)</div>
        <div class="chat-msgs" id="msgs"></div>
    </div>

    <footer id="relogio">00:00:00</footer>

    <script>
        // SISTEMA DE NOTÍCIAS DIÁRIAS (APAGA E POSTA NOVA)
        const news = {
            astro: [
                {t: "Buraco Negro Ativo", d: "Hoje detectamos uma emissão de raios-X vinda do centro da galáxia. A gravidade ali é tão forte que o tempo passa mais devagar!"},
                {t: "Colisão de Galáxias", d: "Andrômeda está vindo em nossa direção. Mas calma, isso só vai acontecer em bilhões de anos. Hoje ela está linda no telescópio!"}
            ],
            anime: [
                {t: "Novo Filme Confirmado", d: "A IA confirmou que um novo filme de alta qualidade está em produção. Os fãs esperam que a animação seja nível Demon Slayer!"},
                {t: "Recorde de One Piece", d: "Hoje o mangá atingiu uma marca histórica de vendas. A jornada de Luffy parece estar chegando em um momento decisivo."}
            ]
        };

        const d = new Date().getDay() % 2;
        document.getElementById('astro-title').innerText = news.astro[d].t;
        document.getElementById('astro-text').innerText = news.astro[d].d;
        document.getElementById('anime-title').innerText = news.anime[d].t;
        document.getElementById('anime-text').innerText = news.anime[d].d;

        // CHAT IA E LIMPEZA
        function toggleChat() {
            const w = document.getElementById('chat-window');
            w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
        }

        function addMsg(name, text) {
            const m = document.getElementById('msgs');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${name}:</b> ${text}`;
            m.prepend(div);
        }

        // Limpa chat a cada 10 minutos
        setInterval(() => {
            document.getElementById('msgs').innerHTML = "";
            addMsg("SISTEMA", "Histórico limpo para manter o portal rápido.");
        }, 600000);

        function askSearch() {
            const val = document.getElementById('topSearch').value;
            if(!val) return;
            addMsg("Daniel", val);
            setTimeout(() => addMsg("RoboIA", "Interessante! Sobre '"+val+"', meus sensores dizem que é uma tendência para 2026!"), 1000);
            document.getElementById('topSearch').value = "";
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // JOGO DO TRIÂNGULO E BALÃO
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let tx = 130, bx = 150, by = 0, b_active = true;

        canvas.onmousemove = (e) => { 
            const rect = canvas.getBoundingClientRect();
            tx = (e.clientX || e.touches[0].clientX) - rect.left - 20; 
        };
        canvas.ontouchmove = canvas.onmousemove;

        function drawGame() {
            ctx.clearRect(0, 0, 320, 400);
            // Balão (Bolinha caindo)
            if(b_active) {
                ctx.beginPath(); ctx.arc(bx, by, 15, 0, 7); ctx.fillStyle = "red"; ctx.fill();
                by += 3;
            } else {
                // Efeito de Estouro
                ctx.font = "20px Arial"; ctx.fillText("💥 POP!", bx-20, by);
                setTimeout(() => { by = 0; bx = Math.random()*280+20; b_active = true; }, 500);
            }

            // Triângulo
            ctx.beginPath(); ctx.moveTo(tx, 380); ctx.lineTo(tx+40, 380); ctx.lineTo(tx+20, 350); 
            ctx.fillStyle = "#58a6ff"; ctx.fill();

            // Colisão
            if(b_active && by > 340 && bx > tx && bx < tx + 40) {
                b_active = false;
                addMsg("JogoIA", "BOOM! Você estourou o balão!");
            }
            if(by > 400) { by = 0; bx = Math.random()*280+20; }
            requestAnimationFrame(drawGame);
        }
        drawGame();

        // TV E RELÓGIO
        const canais = ["Record News", "Jovem Pan", "Band", "SBT News", "CNN Brasil", "TV Brasil", "RedeTV", "TV Cultura", "Gazeta", "Canal Rural", "Terra Viva", "Rede Vida", "TV Câmara", "TV Senado", "Canal Futura"];
        canais.forEach(c => { document.getElementById('tvGrid').innerHTML += `<div style="background:#333; padding:10px; border-radius:5px; font-size:0.7rem; text-align:center;">${c}</div>`; });
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
