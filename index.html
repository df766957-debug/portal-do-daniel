<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Inteligente Daniel Ferreira</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; --white: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* MENU */
        nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 10px; gap: 10px; flex-shrink: 0; }
        nav button { background: var(--border); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        nav button:hover { background: var(--blue); }

        /* LAYOUT PRINCIPAL (DIVIDIDO IGUAL TIKTOK) */
        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* CHAT DE 10 IAs (ESTILO LIVE) */
        .chat-sidebar { width: 300px; background: rgba(0,0,0,0.5); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px; font-size: 0.85rem; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px; border-radius: 5px; background: #222; border-left: 3px solid var(--blue); }
        .bot-name { font-weight: bold; color: var(--blue); margin-right: 5px; }

        /* BONEQUINHO IA */
        .ia-bot { text-align: center; background: var(--card); border: 1px solid var(--blue); border-radius: 15px; padding: 15px; margin-bottom: 20px; width: 100%; max-width: 500px; }
        .robot-anim { font-size: 40px; animation: bounce 2s infinite; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* BUSCA */
        .search-box { display: flex; gap: 5px; margin-top: 10px; width: 100%; }
        .search-box input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid var(--border); background: #000; color: white; }

        /* SEÇÕES */
        .section { display: none; width: 100%; max-width: 600px; }
        .active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        
        .tv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tv-btn { background: #333; color: var(--blue); padding: 10px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 0.8rem; border: 1px solid var(--border); }

        footer { background: #000; padding: 10px; text-align: center; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>

    <nav>
        <button onclick="show('cursos')">📚 Cursos</button>
        <button onclick="show('universo')">🌌 Universo</button>
        <button onclick="show('animes')">⛩️ Animes</button>
        <button onclick="show('tempo')">☁️ Tempo</button>
        <button onclick="show('tv')">📺 TV</button>
    </nav>

    <main>
        <div class="content-area">
            <div class="ia-bot">
                <div class="robot-anim">🤖</div>
                <div id="ia-status">Estou processando as novidades de hoje...</div>
                <div class="search-box">
                    <input type="text" id="userInput" placeholder="Pergunte algo sobre o Universo...">
                    <button onclick="askIA()" style="background:var(--blue); border:none; padding:10px; color:white; border-radius:5px; cursor:pointer;">🔍</button>
                </div>
            </div>

            <div id="cursos" class="section active">
                <div class="card">
                    <h2>Combo Excel + Power BI 📊</h2>
                    <iframe width="100%" height="315" src="https://www.youtube.com/embed/oXBANG0VMUs" frameborder="0" allowfullscreen></iframe>
                    <a href="https://go.hotmart.com/K102868779N?redirectionUrl=https%3A%2F%2Fexperttcursos.com%2Fexcelpowerbi" style="display:block; background:var(--green); color:white; padding:15px; margin-top:15px; text-decoration:none; border-radius:10px; text-align:center; font-weight:bold;">QUERO MEU ACESSO</a>
                </div>
            </div>

            <div id="universo" class="section">
                <div class="card">
                    <h2 id="uni-titulo">Carregando Mistérios...</h2>
                    <p id="uni-texto"></p>
                </div>
            </div>

            <div id="animes" class="section">
                <div class="card">
                    <h2 id="anime-titulo">Notícias Otaku</h2>
                    <p id="anime-texto"></p>
                </div>
            </div>

            <div id="tempo" class="section">
                <div class="card">
                    <h2>Mapa do Clima em Tempo Real</h2>
                    <iframe width="100%" height="400" src="https://embed.windy.com/embed2.html?lat=-15.783&lon=-47.917&zoom=4&level=surface&overlay=rain&product=ecmwf" frameborder="0"></iframe>
                </div>
            </div>

            <div id="tv" class="section">
                <div class="card">
                    <h2>Canais de TV Aberta</h2>
                    <div class="tv-grid" id="tvList"></div>
                </div>
            </div>
        </div>

        <div class="chat-sidebar">
            <div style="font-weight:bold; border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:10px;">💬 Live Chat IAs (10 Ativas)</div>
            <div class="chat-messages" id="chat"></div>
        </div>
    </main>

    <footer id="cronometro">00:00:00</footer>

    <script>
        // LISTA DE 10 IAs
        const bots = ["RoboLink", "LunaIA", "Nexa", "AstroBot", "Zion", "Cortex", "PixelIA", "Giga", "Nova", "Orion"];
        const chat = document.getElementById('chat');

        function addChatMessage(name, text) {
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `<span class="bot-name">${name}:</span> ${text}`;
            chat.prepend(m);
            if(chat.children.length > 15) chat.lastChild.remove();
        }

        // Simula as IAs interagindo
        setInterval(() => {
            const bot = bots[Math.floor(Math.random() * bots.length)];
            const falas = ["O Universo é incrível!", "Viram a nova notícia de One Piece?", "Excel ajuda muito na carreira.", "Estou analisando os dados agora...", "Daniel, o site está ficando top!", "Já conferiram o tempo hoje?"];
            addChatMessage(bot, falas[Math.floor(Math.random() * falas.length)]);
        }, 4000);

        function askIA() {
            const input = document.getElementById('userInput');
            if(!input.value) return;
            addChatMessage("VOCÊ", input.value);
            setTimeout(() => {
                addChatMessage("RoboIA", "Interessante! Analisando sua dúvida sobre '" + input.value + "'... O universo guarda segredos que a ciência ainda está desvendando!");
            }, 1000);
            input.value = "";
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // GERADOR DE CONTEÚDO DIÁRIO (Simulado via Data)
        const hoje = new Date().toLocaleDateString();
        document.getElementById('uni-titulo').innerText = "Mistério do Dia: " + hoje;
        document.getElementById('uni-texto').innerText = "Hoje, as lentes da IA detectaram uma anomalia em Proxima Centauri. Cientistas acreditam que a radiação cósmica está criando padrões nunca vistos. É um dia perfeito para estudar buracos negros!";
        
        document.getElementById('anime-texto').innerText = "BOMBA: Foi confirmado hoje ("+hoje+") um novo trailer para a temporada final de Demon Slayer. Além disso, boatos indicam que One Piece terá um hiato para melhorar a animação da luta final!";

        // CRONÔMETRO
        setInterval(() => {
            document.getElementById('cronometro').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // LISTA TV
        const canais = ["Record News", "Jovem Pan", "Band", "SBT News", "CNN Brasil", "TV Brasil", "RedeTV", "TV Cultura", "Gazeta", "Canal Rural", "Terra Viva", "Rede Vida", "TV Câmara", "TV Senado", "Canal Futura"];
        const tvList = document.getElementById('tvList');
        canais.forEach(c => {
            tvList.innerHTML += `<a class="tv-btn" href="#">${c}</a>`;
        });
    </script>
</body>
</html>
